# =============================================================================
# Cascata V1 — Docker Compose — Modo Shelter ($20/mês VPS)
# =============================================================================
# Total RAM limits: ~2036MB (uso real ~1500MB). Operável em VPS de 2GB.
# Rede: cascata-shelter (bridge). Todos os serviços na mesma rede.
#
# Ref: SAD §2 (Modo Shelter), SRS Req-3.2.1
# Ref: TASK_Fase0 — PR-2
# =============================================================================

networks:
  cascata-shelter:
    driver: bridge

volumes:
  cascata-yb-data:       # YugabyteDB — /home/yugabyte/data
  cascata-ch-data:       # ClickHouse — /var/lib/clickhouse
  cascata-rp-data:       # Redpanda — /var/lib/redpanda/data
  cascata-df-data:       # DragonflyDB — /data
  cascata-openbao-data:  # OpenBao — /openbao/data
  cascata-vm-data:       # VictoriaMetrics — /victoria-metrics-data

services:

  # ===========================================================================
  # YUGABYTEDB — OLTP distribuído (single node no Shelter)
  # Imagem: cascata/yugabytedb:shared (Cat.1 + pg_cron)
  # RAM Limit: 900MB | Portas: 5433 (YSQL), 7100 (master), 9000 (tserver)
  # ===========================================================================
  yugabytedb:
    image: cascata/yugabytedb:shared
    pull_policy: never
    container_name: cascata-yugabytedb
    command: >
      bin/yugabyted start
      --daemon=false
      --tserver_flags="
        ysql_enable_auth=false,
        yb_enable_read_committed_isolation=true,
        enable_ysql_conn_mgr=true,
        allowed_preview_flags_csv=enable_ysql_conn_mgr,
        ysql_pg_conf_csv=\"shared_preload_libraries='pg_stat_statements,pgaudit'\"
      "
      --master_flags="
        default_memory_limit_to_ram_ratio=0.6
      "
    ports:
      - "5433:5433"    # YSQL (PostgreSQL protocol)
      - "7100:7100"    # YB Master UI
      - "9000:9000"    # YB TServer UI
      - "15433:15433"  # YSQL admin
    volumes:
      - cascata-yb-data:/home/yugabyte/yb_data
    deploy:
      resources:
        limits:
          memory: 900M
    networks:
      - cascata-shelter
    healthcheck:
      test: ["CMD", "bin/ysqlsh", "-c", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ===========================================================================
  # DRAGONFLYDB — Cache em memória (drop-in Redis)
  # RAM Limit: 256MB | Porta: 6379
  # ===========================================================================
  dragonflydb:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    container_name: cascata-dragonflydb
    command: >
      dragonfly
      --maxmemory=100mb
      --proactor_threads=1
      --cache_mode=true
      --hz=100
      --save_schedule=""
      --dir=/data
      --dbfilename=dump
    ports:
      - "6379:6379"
    volumes:
      - cascata-df-data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cascata-shelter
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ===========================================================================
  # REDPANDA — Streaming de eventos (Kafka API compatible)
  # RAM Limit: 256MB | Portas: 9092 (kafka), 8081 (schema registry)
  # ===========================================================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.2.5
    container_name: cascata-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=200M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=localhost:8082
      - --schema-registry-addr=0.0.0.0:8081
      - --set=redpanda.auto_create_topics_enabled=true
    ports:
      - "9092:9092"    # Kafka API (external)
      - "8081:8081"    # Schema Registry
      - "8082:8082"    # Pandaproxy (REST)
      - "9644:9644"    # Admin API
    volumes:
      - cascata-rp-data:/var/lib/redpanda/data
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - cascata-shelter
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ===========================================================================
  # CLICKHOUSE — Analytics, logs, traces (OLAP)
  # RAM Limit: 384MB | Portas: 8123 (HTTP), 9001 (native - remapped)
  # ===========================================================================
  clickhouse:
    image: clickhouse/clickhouse-server:25.8-alpine
    container_name: cascata-clickhouse
    environment:
      CLICKHOUSE_DB: cascata_logs
      CLICKHOUSE_USER: cascata
      CLICKHOUSE_PASSWORD: "cascata_dev_ch_2025" # Substituindo Vault para Fase 0
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"    # HTTP interface
      - "9001:9000"    # Native interface (remapped to avoid conflict with YB tserver)
    volumes:
      - cascata-ch-data:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/cascata.xml:ro
      - ./clickhouse/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    deploy:
      resources:
        limits:
          memory: 384M
    networks:
      - cascata-shelter
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================================================
  # OPENBAO — Gestão de secrets (fork aberto do Vault)
  # RAM Limit: 64MB | Porta: 8200
  # ===========================================================================
  openbao:
    image: quay.io/openbao/openbao:2.3.1
    container_name: cascata-openbao
    environment:
      BAO_DEV_ROOT_TOKEN_ID: "cascata-dev-token"
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    volumes:
      - cascata-openbao-data:/openbao/data
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - cascata-shelter
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped


  # ===========================================================================
  # VECTOR — Collector de observabilidade (logs, métricas, traces)
  # RAM Limit: 64MB | Porta: 8686 (API)
  # Dep: clickhouse, redpanda
  # ===========================================================================
  vector:
    image: timberio/vector:0.53.0-alpine
    container_name: cascata-vector
    ports:
      - "8686:8686"    # Vector API
    volumes:
      - ./vector/vector.toml:/etc/vector/vector.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - cascata-shelter
    depends_on:
      clickhouse:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "vector", "top", "--interval", "1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ===========================================================================
  # VICTORIAMETRICS — Métricas (Prometheus-compatible, single node)
  # RAM Limit: 128MB | Porta: 8428
  # ===========================================================================
  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.122.0
    container_name: cascata-victoriametrics
    command:
      - "-storageDataPath=/victoria-metrics-data"
      - "-retentionPeriod=90d"
      - "-httpListenAddr=:8428"
      - "-memory.allowedPercent=80"
    ports:
      - "8428:8428"    # HTTP API (scrape + query)
    volumes:
      - cascata-vm-data:/victoria-metrics-data
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - cascata-shelter
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8428/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ===========================================================================
  # QDRANT — Banco Vetorial (AI Agents Memory & Retrieval)
  # RAM Limit: 128MB | Porta: 6333
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: cascata-qdrant
    ports:
      - "6333:6333"    # HTTP API
      - "6334:6334"    # gRPC API
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - cascata-shelter
    restart: unless-stopped

  # ===========================================================================
  # CENTRIFUGO — Realtime Engine (WebSockets)
  # RAM Limit: 128MB | Porta: 8000
  # Dep: redpanda
  # ===========================================================================
  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: cascata-centrifugo
    command: centrifugo -c /etc/centrifugo/config.json
    ports:
      - "8000:8000"    # HTTP/WebSocket API
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - cascata-shelter
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # GATEWAY — Pingora (Rust) — Data Plane
  # RAM Limit: 48MB | Portas: 8080 (HTTP), 8443 (HTTPS)
  # Dep: yugabytedb, dragonflydb
  # Build: ../../gateway (relativo a infra/docker/)
  # ===========================================================================
  gateway:
    build:
      context: ../../gateway
      dockerfile: Dockerfile
    container_name: cascata-gateway
    ports:
      - "8080:8080"    # HTTP
      - "8443:8443"    # HTTPS
    deploy:
      resources:
        limits:
          memory: 48M
    networks:
      - cascata-shelter
    depends_on:
      yugabytedb:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # CONTROL PLANE — Go — Cérebro roteador
  # RAM Limit: 32MB | Porta: 9090
  # Dep: yugabytedb, dragonflydb, clickhouse
  # Build: ../../control-plane (relativo a infra/docker/)
  # ===========================================================================
  control-plane:
    build:
      context: ../../control-plane
      dockerfile: Dockerfile
    container_name: cascata-control-plane
    ports:
      - "9090:9090"    # HTTP API
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - cascata-shelter
    depends_on:
      yugabytedb:
        condition: service_healthy
      dragonflydb:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
